<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link href="https://fonts.googleapis.com/css2?family=MuseoModerno&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <script src="/js/app.js"></script>
    </head>
    <body>
        <div class="calculator">
            <div id="calculatorScreen" class="output">
                <div id="previous" class="prevOperation"></div>
                <div id="current" class="currentOperation"></div>
            </div>
            <button id="opC" class="spanTwoC">C</button>
            <button id="opMult">X</button>
            <button id="n7">7</button>
            <button id="n8">8</button>
            <button id="n9">9</button>
            <button id="opDiv">÷</button>
            <button id="n4">4</button>
            <button id="n5">5</button>
            <button id="n6">6</button>
            <button id="opSub">-</button>
            <button id="n1">1</button>
            <button id="n2">2</button>
            <button id="n3">3</button>
            <button id="opSum" class="spanTwoP">+</button>
            <button id="n0">0</button>
            <button id="opEqual" class="spanTwoE">=</button>
        </div>
    </body>
</html>
